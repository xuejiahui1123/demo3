spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/lab_db
        username: postgres
        password: 123456
        driver-class-name: org.postgresql.Driver

    # 👇 Redis 配置
    data:
        redis:
            host: 127.0.0.1
            port: 6379
            database: 0

mybatis-plus:
    configuration:
        log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

security:
    jwt:
        secret: demo-jwt-secret-key-for-spring-security-2026
        expiration-millis: 7200000